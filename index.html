<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню армянского ресторана</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>🇦🇲 Армянский Ресторан</h1>
            <p class="subtitle">Традиционная кухня Армении</p>
        </div>
    </header>

    <nav class="menu-nav">
        <div class="container">
            <button class="nav-btn" data-category="all">Всё меню</button>
            <button class="nav-btn" data-category="Холодные закуски">Закуски</button>
            <button class="nav-btn" data-category="Салаты">Салаты</button>
            <button class="nav-btn" data-category="Горячие блюда">Горячее</button>
            <button class="nav-btn" data-category="Шашлыки">Шашлыки</button>
            <button class="nav-btn" data-category="Напитки">Напитки</button>
            <button class="nav-btn" data-category="Десерты">Десерты</button>
        </div>
    </nav>

    <div class="search-container">
        <div class="container">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по меню..." />
        </div>
    </div>

    <main class="container">
        <div id="menuContainer"></div>
    </main>

    <button id="scrollToTop" class="scroll-top">↑</button>

    <footer>
        <div class="container">
            <p>© 2026 Армянский Ресторан | Создано с ❤️</p>
            <p><a href="qr-code.html">Сгенерировать QR-код</a></p>
        </div>
    </footer>

    <script src="menu-data.js"></script>
</body>
</html>
